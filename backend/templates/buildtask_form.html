{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} BuildTask | NexusConstruction{% endblock %}
{% block page_title %}{% if editing %}Edit BuildTask{% else %}New BuildTask{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" name="project_name" value="{{ record.project_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Assigned To</label>
        <input type="text" name="assigned_to" value="{{ record.assigned_to|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="delayed" {% if record.status == 'delayed' %}selected{% endif %}>Delayed</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select name="priority">
          <option value="low" {% if record.priority == 'low' %}selected{% endif %}>Low</option>
          <option value="medium" {% if record.priority == 'medium' %}selected{% endif %}>Medium</option>
          <option value="high" {% if record.priority == 'high' %}selected{% endif %}>High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date" value="{{ record.due_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cost</label>
        <input type="number" step="0.01" name="cost" value="{{ record.cost|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} BuildTask</button>
      <a href="/buildtasks/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
